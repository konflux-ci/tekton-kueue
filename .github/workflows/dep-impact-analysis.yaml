name: Dependency Impact Analysis

on:
  pull_request:
    types: [labeled]

jobs:
  impact-analysis:
    name: AI dependency impact analysis
    if: >-
      (
        github.event.label.name == 'semver/minor' ||
        github.event.label.name == 'semver/major'
      ) &&
      (
        github.event.pull_request.user.login == 'renovate[bot]' ||
        github.event.pull_request.user.login == 'red-hat-konflux[bot]'
      )
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Check API key
        id: check-key
        env:
          HAS_KEY: ${{ secrets.GEMINI_API_KEY != '' }}
        run: |
          if [[ "${HAS_KEY}" != "true" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "GEMINI_API_KEY secret is not configured"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post missing key comment
        if: steps.check-key.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "## AI Dependency Impact Analysis

          > **Skipped**: The \`GEMINI_API_KEY\` secret is not configured in this repository. Configure it to enable AI-assisted dependency impact analysis."

      - name: Checkout code
        if: steps.check-key.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Extract bump type from label
        if: steps.check-key.outputs.skip != 'true'
        id: bump
        run: |
          LABEL="${{ github.event.label.name }}"
          BUMP_TYPE="${LABEL#semver/}"
          echo "type=${BUMP_TYPE}" >> "$GITHUB_OUTPUT"

      - name: Gather dependency context
        if: steps.check-key.outputs.skip != 'true'
        id: context
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Write PR body to a temp file to avoid shell escaping issues
          echo "${PR_BODY}" > /tmp/pr-body.md

          CONTEXT=$(./hack/gather-dep-context.sh /tmp/pr-body.md "${{ github.event.pull_request.title }}")
          # Write context to file for the next step
          echo "${CONTEXT}" > /tmp/dep-context.json

      - name: Prepare prompt
        if: steps.check-key.outputs.skip != 'true'
        id: prompt
        run: |
          CONTEXT=$(cat /tmp/dep-context.json)
          BUMP_TYPE="${{ steps.bump.outputs.type }}"
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Read template and substitute placeholders
          PROMPT=$(cat hack/dep-impact-prompt.md)
          PROMPT="${PROMPT//\{\{PACKAGE_CONTEXT\}\}/${CONTEXT}}"
          PROMPT="${PROMPT//\{\{BUMP_TYPE\}\}/${BUMP_TYPE}}"
          PROMPT="${PROMPT//\{\{PR_TITLE\}\}/${PR_TITLE}}"

          # Write prepared prompt to file
          echo "${PROMPT}" > /tmp/prepared-prompt.md

      - name: Call Gemini API
        if: steps.check-key.outputs.skip != 'true'
        id: analysis
        run: |
          set +x
          PROMPT_CONTENT=$(python3 -c 'import sys,json; print(json.dumps(open("/tmp/prepared-prompt.md").read()))')

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 120 \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "content-type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": ${PROMPT_CONTENT}
                }]
              }]
            }" 2>&1) || true

          # Split response body and HTTP status code
          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | sed '$d')

          if [[ "${HTTP_CODE}" != "200" ]]; then
            echo "API call failed with status ${HTTP_CODE}" >&2
            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract the text content from the Gemini response
          ANALYSIS=$(echo "${BODY}" | python3 -c 'import sys,json; data=json.load(sys.stdin); print(data["candidates"][0]["content"]["parts"][0]["text"])' 2>/dev/null) || true

          if [[ -z "${ANALYSIS}" ]]; then
            echo "Failed to parse API response" >&2
            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "${ANALYSIS}" > /tmp/analysis-result.md
          echo "success=true" >> "$GITHUB_OUTPUT"

          # Extract risk level from the analysis output
          RISK_LEVEL=$(echo "${ANALYSIS}" | grep -oiP '(?<=Risk Level:\s)(LOW|MEDIUM|HIGH)' | head -1 | tr '[:upper:]' '[:lower:]') || true
          echo "risk=${RISK_LEVEL:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Apply risk label
        if: steps.check-key.outputs.skip != 'true' && steps.analysis.outputs.success == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RISK="${{ steps.analysis.outputs.risk }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Remove any existing risk labels
          for level in low medium high; do
            gh pr edit "${PR_NUMBER}" --repo "${{ github.repository }}" --remove-label "risk/${level}" 2>/dev/null || true
          done

          if [[ -n "${RISK}" && "${RISK}" != "unknown" ]]; then
            # Create the label if it doesn't exist (with color)
            case "${RISK}" in
              low)    COLOR="0e8a16" ;;  # green
              medium) COLOR="fbca04" ;;  # yellow
              high)   COLOR="e11d48" ;;  # red
            esac

            gh label create "risk/${RISK}" --repo "${{ github.repository }}" \
              --color "${COLOR}" --description "AI-assessed ${RISK} risk dependency update" \
              --force 2>/dev/null || true

            gh pr edit "${PR_NUMBER}" --repo "${{ github.repository }}" --add-label "risk/${RISK}" || true
          fi

      - name: Delete previous analysis comment
        if: steps.check-key.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | startswith("## AI Dependency Impact Analysis")) | .id' || true)

          for id in ${EXISTING}; do
            gh api -X DELETE "repos/${{ github.repository }}/issues/comments/${id}" || true
          done

      - name: Post analysis comment
        if: steps.check-key.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ steps.analysis.outputs.success }}" == "true" ]]; then
            # Prepend the standard header
            {
              echo "## AI Dependency Impact Analysis"
              echo ""
              cat /tmp/analysis-result.md
            } > /tmp/final-comment.md
          else
            cat > /tmp/final-comment.md << 'FALLBACK'
          ## AI Dependency Impact Analysis

          > **Analysis unavailable**: The AI API call did not succeed. This does not block the PR — please review the dependency update manually.
          FALLBACK
          fi

          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/final-comment.md
